steps:
  # Step 0: Fetch git submodules (ots-common)
  - name: "bash"
    entrypoint: bash
    args:
      - -c
      - git submodule update --init --depth 1

  # Step 1: Run tests
  - name: "python:3.12-slim"
    entrypoint: bash
    env:
      - DB_URL=postgresql+asyncpg://test:test@localhost/test
      - PYTHONPATH=ots-common:$PYTHONPATH
    args:
      - -c
      - pip install -r requirements.txt -r requirements-dev.txt && pytest

  # Step 2: Build container image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - asia-east1-docker.pkg.dev/$PROJECT_ID/ots/api-backend:$BUILD_ID
      - -t
      - asia-east1-docker.pkg.dev/$PROJECT_ID/ots/api-backend:latest
      - .

  # Step 2: Push to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - --all-tags
      - asia-east1-docker.pkg.dev/$PROJECT_ID/ots/api-backend

  # Step 3: Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ots-api-backend-$_ENV
      - --image=asia-east1-docker.pkg.dev/$PROJECT_ID/ots/api-backend:$BUILD_ID
      - --region=asia-east1
      - --service-account=ots-api-backend-$_ENV@$PROJECT_ID.iam.gserviceaccount.com
      - --add-cloudsql-instances=$PROJECT_ID:asia-east1:ots-db-$_ENV
      - --network=default
      - --subnet=default
      - --vpc-egress=private-ranges-only
      - --set-secrets=DB_URL=ots-db-url-$_ENV:latest
      - --set-secrets=ECPAY_MERCHANT_ID=ots-ecpay-merchant-id-$_ENV:latest
      - --set-secrets=ECPAY_HASH_KEY=ots-ecpay-hash-key-$_ENV:latest
      - --set-secrets=ECPAY_HASH_IV=ots-ecpay-hash-iv-$_ENV:latest
      - --set-secrets=GEMINI_API_KEY=ots-google-ai-key-$_ENV:latest
      - --set-secrets=BREVO_API_KEY=ots-brevo-apikey-$_ENV:latest
      - --set-secrets=BRONCI_API_USERNAME=ots-bronci-username-$_ENV:latest
      - --set-secrets=BRONCI_API_PASSWORD=ots-bronci-password-$_ENV:latest
      - --set-secrets=BRONCI_API_BASE_URL=ots-bronci-base-url-$_ENV:latest
      - --set-secrets=HF_API_TOKEN=ots-hf-api-token-$_ENV:latest
      - --set-secrets=REPLICATE_API_TOKEN=ots-replicate-api-token-$_ENV:latest
      - --set-secrets=NVIDIA_API_TOKEN=ots-nvidia-api-token-$_ENV:latest
      - --set-env-vars=PROJECT_ID=$PROJECT_ID
      - --set-env-vars=SERVICE_ACCOUNT_EMAIL=ots-api-backend-$_ENV@$PROJECT_ID.iam.gserviceaccount.com      
      - --set-env-vars=INTERNAL_ALLOWED_SA=ots-workflow-$_ENV@$PROJECT_ID.iam.gserviceaccount.com
      - --set-env-vars=ENV=$_ENV
      - --set-env-vars=GCS_UPLOADS_BUCKET=$PROJECT_ID-uploads-$_ENV
      - --set-env-vars=GCS_OUTPUTS_BUCKET=$PROJECT_ID-outputs-$_ENV
      - --set-env-vars=GCS_TEMP_BUCKET=$PROJECT_ID-pipeline-temp-$_ENV
      - --set-env-vars=PUBSUB_TOPIC=ots-pipeline-trigger-$_ENV
      - --set-env-vars=NOTIFY_TOPIC=ots-notify-$_ENV
      - --set-env-vars=EMAIL_PROVIDER=brevo
      - --set-env-vars=EMAIL_FROM_ADDRESS=noreply@ots.tw
      - --set-env-vars=EMAIL_FROM_NAME=OTS 翻譯服務
      - --set-env-vars=WEB_PORTAL_URL=$_WEB_PORTAL_URL
      - --no-allow-unauthenticated
      - --min-instances=0
      - --max-instances=5
      - --memory=1Gi
      - --quiet

substitutions:
  _ENV: dev
  _WEB_PORTAL_URL: https://ots-frontend-dev-miptn5nxpa-de.a.run.app

images:
  - asia-east1-docker.pkg.dev/$PROJECT_ID/ots/api-backend

options:
  logging: CLOUD_LOGGING_ONLY
