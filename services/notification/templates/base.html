<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { margin: 0; padding: 0; background: #f5f5f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', Meiryo, 'Malgun Gothic', sans-serif; }
  .container { max-width: 600px; margin: 0 auto; padding: 20px; }
  .header { background: #1F497D; padding: 24px; text-align: center; border-radius: 8px 8px 0 0; }
  .header h1 { color: #fff; margin: 0; font-size: 20px; font-weight: 600; }
  .body { background: #fff; padding: 32px 24px; border-left: 1px solid #e0e0e0; border-right: 1px solid #e0e0e0; }
  .footer { background: #fafafa; padding: 16px 24px; text-align: center; border: 1px solid #e0e0e0; border-radius: 0 0 8px 8px; font-size: 12px; color: #999; }
  .btn { display: inline-block; padding: 12px 24px; background: #1F497D; color: #fff !important; text-decoration: none; border-radius: 6px; font-weight: 600; }
  .btn:hover { background: #16365e; }
  .info { background: #f8f9ff; border-left: 4px solid #1F497D; padding: 12px 16px; margin: 16px 0; border-radius: 4px; font-size: 14px; color: #555; }
  table.details { width: 100%; border-collapse: collapse; margin: 16px 0; }
  table.details td { padding: 8px 12px; border-bottom: 1px solid #eee; font-size: 14px; }
  table.details td:first-child { color: #888; width: 100px; }
  @media (max-width: 480px) { .container { padding: 10px; } .body { padding: 20px 16px; } }
</style>
</head>
<body>
<div class="container">
  <div class="header"><h1>{{ header_title }}</h1></div>
  <div class="body">
    {% block content %}{% endblock %}
  </div>
  <div class="footer">
    {{ footer_text }}<br>
    {{ footer_contact }}
  </div>
</div>
</body>
</html>
